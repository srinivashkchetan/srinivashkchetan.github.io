<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Atelier — made-to-measure prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#16203a;
    --ink-soft:#2a3654;
    --paper:#f3eee2;
    --card:#fbf8f1;
    --brass:#b3862a;
    --brass-soft:#d6b25c;
    --indigo:#2f4868;
    --text:#1f242e;
    --muted:#6e7079;
    --line:#e2d9c6;
    --line-strong:#cfc4ab;
    --good:#4f6b54;
    --serif:'Fraunces',Georgia,'Times New Roman',serif;
    --sans:'DM Sans',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{line-height:1.5;padding:0 16px 64px}
  .wrap{max-width:920px;margin:0 auto}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 2px 18px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand .mark{font-family:var(--serif);font-weight:600;font-size:22px;letter-spacing:.3px;color:var(--ink)}
  .brand .mark em{font-style:italic;color:var(--brass)}
  .ribbon{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);border:1px solid var(--line-strong);border-radius:999px;padding:4px 10px}
  .restart{font-family:var(--sans);font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .restart:hover{color:var(--ink)}

  /* progress: running-stitch */
  .progress{display:flex;align-items:center;justify-content:center;gap:0;padding:26px 0 6px;flex-wrap:wrap}
  .pstep{display:flex;align-items:center;gap:0}
  .pdot{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:62px}
  .pdot .bead{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--line-strong);background:var(--paper);transition:.25s}
  .pdot .lab{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);transition:.25s}
  .pdot.done .bead{background:var(--brass);border-color:var(--brass)}
  .pdot.active .bead{background:var(--ink);border-color:var(--ink);box-shadow:0 0 0 4px rgba(22,32,58,.10)}
  .pdot.active .lab{color:var(--ink);font-weight:600}
  .pseam{width:34px;height:0;border-top:1.5px dashed var(--line-strong);margin:0 -2px;align-self:flex-start;margin-top:6px}
  .pseam.done{border-color:var(--brass)}
  @media(max-width:560px){.pdot{min-width:52px}.pdot .lab{font-size:10px}.pseam{width:18px}}

  /* stage */
  .stage{padding:30px 0 0}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--brass);font-weight:600;margin-bottom:14px}
  h1{font-family:var(--serif);font-weight:500;font-size:clamp(30px,5vw,46px);line-height:1.06;letter-spacing:-.5px;color:var(--ink)}
  h1 em{font-style:italic;color:var(--brass)}
  h2{font-family:var(--serif);font-weight:500;font-size:clamp(24px,3.6vw,32px);line-height:1.1;letter-spacing:-.3px;color:var(--ink)}
  .lede{font-size:17px;color:var(--muted);max-width:54ch;margin-top:16px}
  .sub{font-size:15px;color:var(--muted);margin-top:8px;max-width:58ch}

  .btn{font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;border:none;border-radius:2px;padding:14px 26px;transition:.18s;display:inline-flex;align-items:center;gap:9px}
  .btn-primary{background:var(--ink);color:#fff}
  .btn-primary:hover{background:var(--ink-soft)}
  .btn-primary:disabled{background:var(--line-strong);color:#fff;cursor:not-allowed}
  .btn-ghost{background:none;color:var(--ink);padding:14px 6px}
  .btn-ghost:hover{color:var(--brass)}
  .actions{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:34px;padding-top:24px;border-top:1px solid var(--line)}

  /* hero */
  .hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;padding-top:34px}
  @media(max-width:720px){.hero-grid{grid-template-columns:1fr;gap:28px}}
  .hero-card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:8px;box-shadow:0 18px 50px -30px rgba(22,32,58,.45)}
  .bolt{height:300px;border-radius:3px;position:relative;overflow:hidden}
  .bolt .tag{position:absolute;left:14px;bottom:14px;background:rgba(251,248,241,.92);border-radius:2px;padding:8px 12px;font-size:12px}
  .bolt .tag b{display:block;font-family:var(--serif);font-size:14px;color:var(--ink);font-weight:600}
  .hero-points{margin-top:26px;display:flex;flex-direction:column;gap:12px}
  .hero-points div{font-size:14.5px;color:var(--text);display:flex;gap:11px;align-items:flex-start}
  .hero-points .k{color:var(--brass);font-weight:600;flex:none;width:18px}

  /* selection cards */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:30px}
  @media(max-width:680px){.cards{grid-template-columns:1fr}}
  .card-sel{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:0;cursor:pointer;text-align:left;transition:.18s;overflow:hidden;font-family:var(--sans)}
  .card-sel:hover{border-color:var(--brass-soft);transform:translateY(-2px)}
  .card-sel.on{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
  .card-sel .pic{height:150px}
  .card-sel .body{padding:16px 18px 18px}
  .card-sel .ttl{font-family:var(--serif);font-size:19px;color:var(--ink);font-weight:600}
  .card-sel .desc{font-size:13.5px;color:var(--muted);margin-top:5px}

  /* fabric grid */
  .tabs{display:inline-flex;gap:4px;background:var(--card);border:1px solid var(--line);border-radius:3px;padding:4px;margin-top:22px}
  .tab{font-family:var(--sans);font-size:14px;font-weight:600;color:var(--muted);background:none;border:none;border-radius:2px;padding:8px 18px;cursor:pointer}
  .tab.on{background:var(--ink);color:#fff}
  .swatches{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:22px}
  @media(max-width:680px){.swatches{grid-template-columns:repeat(2,1fr)}}
  .swatch{background:var(--card);border:1px solid var(--line);border-radius:4px;cursor:pointer;overflow:hidden;transition:.16s;font-family:var(--sans);text-align:left;padding:0}
  .swatch:hover{border-color:var(--brass-soft);transform:translateY(-2px)}
  .swatch.on{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
  .swatch .cloth{height:104px;position:relative}
  .swatch .cloth .chk{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;display:none;align-items:center;justify-content:center;font-size:13px}
  .swatch.on .cloth .chk{display:flex}
  .swatch .info{padding:12px 14px 14px}
  .swatch .nm{font-family:var(--serif);font-size:16px;color:var(--ink);font-weight:600}
  .swatch .nt{font-size:12.5px;color:var(--muted);margin-top:3px;min-height:32px}
  .swatch .pr{font-size:13px;color:var(--ink);font-weight:600;margin-top:6px}

  /* style chips */
  .group{margin-top:24px}
  .group .glab{font-size:13px;letter-spacing:.04em;color:var(--ink);font-weight:600;margin-bottom:11px}
  .group .glab span{color:var(--muted);font-weight:400}
  .chips{display:flex;flex-wrap:wrap;gap:10px}
  .chip{font-family:var(--sans);font-size:14px;color:var(--text);background:var(--card);border:1px solid var(--line-strong);border-radius:999px;padding:9px 17px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:var(--brass)}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stylecol{border-top:1px dashed var(--line-strong);margin-top:26px;padding-top:8px}
  .stylecol:first-child{border-top:none;margin-top:0;padding-top:0}
  .colttl{font-family:var(--serif);font-size:18px;color:var(--brass);font-weight:600;margin-top:18px}

  /* measurement methods */
  .methods{display:grid;grid-template-columns:1fr;gap:14px;margin-top:26px}
  .method{display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:20px 22px;cursor:pointer;text-align:left;font-family:var(--sans);transition:.16s}
  .method:hover{border-color:var(--brass-soft)}
  .method.on{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
  .method .ic{width:44px;height:44px;border-radius:50%;background:var(--paper);border:1px solid var(--line-strong);display:flex;align-items:center;justify-content:center;font-size:20px}
  .method.on .ic{background:var(--brass);border-color:var(--brass)}
  .method .mt{font-family:var(--serif);font-size:18px;color:var(--ink);font-weight:600}
  .method .md{font-size:13.5px;color:var(--muted);margin-top:3px}
  .method .meta{font-size:12px;color:var(--brass);font-weight:600;white-space:nowrap}
  .method .meta.soft{color:var(--muted);font-weight:500}

  /* review */
  .review{background:var(--card);border:1px solid var(--line);border-radius:4px;margin-top:26px;overflow:hidden}
  .rrow{display:grid;grid-template-columns:120px 1fr;gap:16px;padding:18px 22px;border-bottom:1px solid var(--line);align-items:center}
  .rrow:last-of-type{border-bottom:none}
  .rrow .rk{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .rrow .rv{font-size:15px;color:var(--text)}
  .rrow .rv b{font-family:var(--serif);font-weight:600;color:var(--ink)}
  .rmini{display:flex;align-items:center;gap:12px}
  .rmini .sw{width:34px;height:34px;border-radius:3px;border:1px solid var(--line-strong);flex:none}
  .total{display:flex;justify-content:space-between;align-items:flex-end;padding:22px;background:var(--ink);color:#fff}
  .total .tl{font-size:13px;letter-spacing:.06em;text-transform:uppercase;opacity:.75}
  .total .tv{font-family:var(--serif);font-size:30px;font-weight:600}
  .total .br{font-size:12.5px;opacity:.7;margin-top:4px}
  .deliver{font-size:13.5px;color:var(--muted);margin-top:14px;display:flex;align-items:center;gap:8px}

  /* confirm */
  .confirm{text-align:center;padding:40px 0 10px}
  .seal{width:78px;height:78px;border-radius:50%;background:var(--brass);color:#fff;display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 24px;font-family:var(--serif)}
  .ordernum{font-family:var(--sans);font-size:13px;letter-spacing:.1em;color:var(--muted);margin-top:18px}
  .protonote{margin-top:30px;background:var(--card);border:1px dashed var(--line-strong);border-radius:4px;padding:16px 20px;font-size:13.5px;color:var(--muted);max-width:52ch;margin-left:auto;margin-right:auto}

  /* the look */
  .looknote{font-size:13.5px;color:var(--muted);margin-top:10px;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .chipfab{display:inline-flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px 13px 4px 5px;font-size:12.5px;color:var(--ink);font-weight:500}
  .chipfab .dot{width:20px;height:20px;border-radius:50%;border:1px solid var(--line-strong)}
  .looks{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
  @media(max-width:680px){.looks{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:420px){.looks{grid-template-columns:1fr}}
  .look{background:var(--card);border:1px solid var(--line);border-radius:4px;cursor:pointer;overflow:hidden;transition:.16s;font-family:var(--sans);text-align:left;padding:0}
  .look:hover{border-color:var(--brass-soft);transform:translateY(-2px)}
  .look.on{border-color:var(--ink);box-shadow:0 0 0 1px var(--ink)}
  .look .frame{height:206px;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 95% at 50% 0%,#ffffff 0%,var(--paper) 92%);border-bottom:1px solid var(--line);position:relative}
  .look .frame svg{height:186px;width:auto;filter:drop-shadow(0 9px 16px rgba(22,32,58,.13))}
  .look .frame .chk{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--ink);color:#fff;display:none;align-items:center;justify-content:center;font-size:13px}
  .look.on .frame .chk{display:flex}
  .look .info{padding:13px 15px 15px}
  .look .nm{font-family:var(--serif);font-size:17px;color:var(--ink);font-weight:600}
  .look .nt{font-size:12.5px;color:var(--muted);margin-top:3px}
  .rmini .gpv{width:48px;height:58px;flex:none;display:flex;align-items:center;justify-content:center}
  .rmini .gpv svg{height:56px;width:auto}

  /* version toggle + size chart */
  .topright{display:flex;align-items:center;gap:16px}
  .vtoggle{display:inline-flex;align-items:center;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px}
  .vtoggle .vlab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 5px 0 8px}
  .vbtn{font-family:var(--sans);font-size:12.5px;font-weight:600;color:var(--muted);background:none;border:none;border-radius:999px;padding:6px 12px;cursor:pointer;white-space:nowrap}
  .vbtn.on{background:var(--ink);color:#fff}
  @media(max-width:560px){.vtoggle .vlab{display:none}.vbtn{padding:6px 9px;font-size:11.5px}.topright{gap:9px}}
  .charttoggle{font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--ink);background:none;border:none;cursor:pointer;margin-top:24px;padding:0;text-decoration:underline;text-underline-offset:3px}
  .charttoggle:hover{color:var(--brass)}
  .chartbox{margin-top:14px;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:16px 18px}
  .unitrow{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);margin-bottom:6px}
  .unittoggle{display:inline-flex;border:1px solid var(--line-strong);border-radius:999px;overflow:hidden}
  .ubtn{font-family:var(--sans);font-size:12px;font-weight:600;color:var(--muted);background:none;border:none;padding:5px 13px;cursor:pointer}
  .ubtn.on{background:var(--ink);color:#fff}
  .chartwrap{margin-top:14px}
  .charttitle{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--brass);font-weight:600;margin-bottom:6px}
  table.sizechart{width:100%;border-collapse:collapse;font-size:13.5px}
  table.sizechart th{text-align:left;font-weight:600;color:var(--muted);font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:7px 8px;border-bottom:1px solid var(--line-strong)}
  table.sizechart td{padding:8px;border-bottom:1px solid var(--line);color:var(--text)}
  table.sizechart tbody tr:last-child td{border-bottom:none}
  table.sizechart td:first-child,table.sizechart th:first-child{font-family:var(--serif);color:var(--ink);font-weight:600}
  .escape{margin-top:24px;font-size:13.5px;color:var(--muted)}
  .escape a{color:var(--brass);font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px}

  /* garment groups + preview */
  .ggroup{margin-top:26px}
  .gtitle{font-family:var(--serif);font-size:16px;color:var(--brass);font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:12px}
  .gtitle::after{content:"";height:1px;flex:1;background:var(--line)}
  .preview{display:grid;grid-template-columns:1.25fr .75fr;gap:22px;margin-top:24px;align-items:stretch}
  @media(max-width:680px){.preview{grid-template-columns:1fr}}
  .preview-stage{background:radial-gradient(120% 90% at 50% 0%,#ffffff 0%,var(--paper) 92%);border:1px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;padding:24px;min-height:340px}
  .preview-stage svg{height:320px;width:auto;filter:drop-shadow(0 14px 26px rgba(22,32,58,.16))}
  @media(max-width:680px){.preview-stage{min-height:300px}.preview-stage svg{height:280px}}
  .preview-side{display:flex;flex-direction:column;gap:12px;justify-content:center}
  .pside-h{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .fabline{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:11px 13px}
  .fabline .dot{width:36px;height:36px;border-radius:3px;border:1px solid var(--line-strong);flex:none}
  .fabline .ft{font-family:var(--serif);font-size:15px;color:var(--ink);font-weight:600}
  .fabline .fs{font-size:12px;color:var(--muted);margin-top:1px}
  .changelink{color:var(--brass);font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-size:13px;margin-top:4px;display:inline-block}

  .fadein{animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @media(prefers-reduced-motion:reduce){.fadein{animation:none}.card-sel:hover,.swatch:hover{transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="mark">Atelier<em>&thinsp;·</em></span><span class="ribbon">Prototype</span></div>
    <div class="topright">
      <div class="vtoggle">
        <span class="vlab">Fit test</span>
        <button id="v-sizes" class="vbtn" onclick="setVersion('sizes')">Sizes</button>
        <button id="v-measure" class="vbtn" onclick="setVersion('measure')">Made-to-measure</button>
      </div>
      <button class="restart" onclick="reset()">Start over</button>
    </div>
  </div>

  <div id="progress" class="progress" style="display:none"></div>
  <div id="stage" class="stage"></div>
</div>

<script>
/* ---------- data ---------- */
const FAB = {
  top:[
    {id:'indigodabu', nm:'Indigo Dabu', nt:'Hand-block botanical motifs', pr:780, tone:'#5c5e5e', weave:'plain'},
    {id:'yellowfloral', nm:'Yellow Floral', nt:'Summer florals on ochre', pr:620, tone:'#ac936b', weave:'plain'},
    {id:'indigoikat', nm:'Indigo Ikat', nt:'Woven ikat, deep indigo', pr:950, tone:'#4b474d', weave:'plain'},
    {id:'indigoleaf', nm:'Indigo Leaf Stripe', nt:'Leaf-vine stripes', pr:720, tone:'#584750', weave:'plain'},
    {id:'indigobuti', nm:'Indigo Buti', nt:'Red buti on indigo', pr:680, tone:'#6a5e5d', weave:'plain'},
    {id:'mural', nm:'Mural Print', nt:'Folk mural storytelling print', pr:890, tone:'#a1907e', weave:'plain'},
    {id:'orangebuti', nm:'Orange Buti', nt:'Gold buti on rust', pr:650, tone:'#a46044', weave:'plain'},
    {id:'bluebuti', nm:'Blue Floral Buti', nt:'Floral buti on blue', pr:660, tone:'#87817b', weave:'plain'},
    {id:'pinkbuti', nm:'Pink Buti', nt:'White dots on pink', pr:590, tone:'#cb4d8c', weave:'plain'},
    {id:'blacktriangle', nm:'Black Triangle Buti', nt:'Cream triangles on black', pr:640, tone:'#686154', weave:'plain'},
    {id:'turqbuti', nm:'Turquoise Buti', nt:'White dots on turquoise', pr:610, tone:'#6cb09f', weave:'plain'},
    {id:'marigold', nm:'Yellow Marigold', nt:'Marigold florals on yellow', pr:630, tone:'#b18e5f', weave:'plain'},
  ],
  bottom:[
    {id:'blackikat', nm:'Black Ikat', nt:'Monochrome woven ikat', pr:950, tone:'#473d2c', weave:'plain'},
    {id:'greencheck', nm:'Green Check', nt:'Green & pink handloom check', pr:540, tone:'#88ada1', weave:'plain'},
    {id:'pinkcheck', nm:'Pink Check Lungi', nt:'Fine pink cotton check', pr:480, tone:'#c19691', weave:'plain'},
    {id:'mustardikat', nm:'Mustard Ikat', nt:'Ochre woven ikat', pr:900, tone:'#c07f1d', weave:'plain'},
    {id:'ivorystripe', nm:'Ivory Stripe', nt:'Woven bands on ivory', pr:560, tone:'#a7a18e', weave:'plain'},
    {id:'pinkwindow', nm:'Pink Windowpane', nt:'Pink windowpane check', pr:500, tone:'#aa9887', weave:'plain'},
    {id:'yellowgingham', nm:'Yellow Gingham', nt:'Sunny gingham check', pr:520, tone:'#ad9256', weave:'plain'},
    {id:'blackcheck', nm:'Black Check', nt:'Black & white handloom check', pr:530, tone:'#9b9589', weave:'plain'},
  ]
};
const STITCH = {top:650, bottom:700, set:1300};
const METERS = {top:2.0, bottom:1.5};

const PHOTOS={
  indigodabu:'assets/fabrics/Another%20indigo.jpeg',
  yellowfloral:'assets/fabrics/Flower%20in%20yellow.jpeg',
  indigoikat:'assets/fabrics/Indigo%20-%202.jpeg',
  indigoleaf:'assets/fabrics/Indigo%20with%20leaves.jpeg',
  indigobuti:'assets/fabrics/Indigo.jpeg',
  mural:'assets/fabrics/Mural.jpeg',
  orangebuti:'assets/fabrics/Orange.jpeg',
  bluebuti:'assets/fabrics/Pattern.jpeg',
  pinkbuti:'assets/fabrics/Pink%20gawd.jpeg',
  blacktriangle:'assets/fabrics/Triangle%20on%20black.jpeg',

function swatchBg(f){ const u=imgOf(f.id); return u ? ("#efe9dd url('"+u+"') center/cover no-repeat") : weaveBg(f.weave,f.tone); }

function weaveBg(weave, tone){
  let p='';
  if(weave==='plain') p="repeating-linear-gradient(0deg,rgba(0,0,0,.05) 0 2px,transparent 2px 4px),repeating-linear-gradient(90deg,rgba(0,0,0,.05) 0 2px,transparent 2px 4px)";
  else if(weave==='twill') p="repeating-linear-gradient(45deg,rgba(0,0,0,.09) 0 3px,rgba(255,255,255,.06) 3px 6px)";
  else if(weave==='slub') p="repeating-linear-gradient(90deg,rgba(0,0,0,.05) 0 1px,transparent 1px 6px),repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0 1px,transparent 1px 8px)";
  else if(weave==='satin') p="linear-gradient(135deg,rgba(255,255,255,.30),transparent 55%),linear-gradient(315deg,rgba(0,0,0,.06),transparent 50%)";
  else if(weave==='cord') p="repeating-linear-gradient(90deg,rgba(0,0,0,.14) 0 4px,rgba(255,255,255,.07) 4px 9px)";
  else if(weave==='basket') p="repeating-linear-gradient(0deg,rgba(0,0,0,.07) 0 4px,transparent 4px 8px),repeating-linear-gradient(90deg,rgba(0,0,0,.07) 0 4px,transparent 4px 8px)";
  return p + ',' + tone;
}

function pat(id,tone,weave,img){
  if(img){ return '<pattern id="'+id+'" width="200" height="240" patternUnits="userSpaceOnUse">'+'<rect width="200" height="240" fill="'+tone+'"/><image href="'+img+'" x="0" y="0" width="200" height="240" preserveAspectRatio="xMidYMid slice"/></pattern>'; }
  let l='';
  if(weave==='plain') l='<path d="M0 4 H8 M4 0 V8" stroke="rgba(0,0,0,.08)" stroke-width="1"/>';
  else if(weave==='twill') l='<path d="M-2 6 L6 -2 M2 10 L10 2" stroke="rgba(0,0,0,.11)" stroke-width="1.4"/>';
  else if(weave==='slub') l='<path d="M0 3 H8 M0 6 H8 M3 0 V8" stroke="rgba(0,0,0,.06)" stroke-width=".8"/>';
  else if(weave==='satin') l='<path d="M-2 8 L8 -2" stroke="rgba(255,255,255,.20)" stroke-width="1.4"/>';
  else if(weave==='cord') l='<path d="M2 0 V8 M6 0 V8" stroke="rgba(0,0,0,.14)" stroke-width="2"/>';
  else if(weave==='basket') l='<path d="M0 0 H8 M0 4 H8 M0 0 V8 M4 0 V8" stroke="rgba(0,0,0,.07)" stroke-width="1.4"/>';
  return '<pattern id="'+id+'" width="8" height="8" patternUnits="userSpaceOnUse"><rect width="8" height="8" fill="'+tone+'"/>'+l+'</pattern>';
}

function garmentSVG(drawType, neutral){
  let topF, botF;
  if(neutral){ topF=botF={tone:'#e9e2d3',weave:'plain'}; }
  else {
    const ft=S.fabric.top?fabById(S.fabric.top):null;
    const fb=S.fabric.bottom?fabById(S.fabric.bottom):null;
    topF=ft||fb||{tone:'#cfd8df',weave:'plain'};
    botF=fb||ft||{tone:'#bda886',weave:'twill'};
  }
  const topImg=(!neutral&&topF.id)?imgOf(topF.id):'';
  const botImg=(!neutral&&botF.id)?imgOf(botF.id):'';
  const defs='<defs>'+pat('pT',topF.tone,topF.weave,topImg)+pat('pB',botF.tone,botF.weave,botImg)+'</defs>';
  return '<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">'+defs+(DRAW[drawType]||DRAW.shirt)()+'</svg>';
}
function styleProgress(){
  const order=['hero','mode','fabric','style','measure','review','done'];
  return order.indexOf(S.step);
}
function renderProgress(){
  const pe=document.getElementById('progress');
  if(S.step==='hero'||S.step==='done'){pe.style.display='none';return;}
  pe.style.display='flex';
  const cur=STEPS.findIndex(s=>s[0]===S.step);
  let h='';
  STEPS.forEach((s,i)=>{
    const cls=i<cur?'done':(i===cur?'active':'');
    if(i>0) h+=`<div class="pseam ${i<=cur?'done':''}"></div>`;
    h+=`<div class="pstep"><div class="pdot ${cls}"><div class="bead"></div><div class="lab">${s[1]}</div></div></div>`;
  });
  pe.innerHTML=h;
}

      <div class="ic">${ic}</div>
      <div><div class="mt">${t}</div><div class="md">${d}</div></div>
      <div class="meta ${soft?'soft':''}">${meta}</div></button>`;
  return `<div class="fadein">
    <div class="eyebrow">Step five — the part everyone worries about</div>
    <h2>How should we get your fit?</h2>
    <p class="sub">Pick whatever feels easiest. Your first piece is covered by a free-alteration fit guarantee.</p>
    <div class="methods">
      ${m('self','📏','Guide me through self-measurement','Step-by-step video + tape. About 10 minutes.','Most popular')}
      ${m('match','👕','Match a garment I already love','Tell us about a piece that fits you perfectly — we copy it.','No tape needed')}
      ${m('home','🚪','Book a home fitting','A fit expert visits you with fabric swatches in hand.','Metros only', true)}
    </div>
    <div class="escape">Prefer a standard size? <a onclick="setVersion('sizes')">Use S · M · L instead →</a></div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="go('style')">← Back</button>
      <button class="btn btn-primary" ${S.method?'':'disabled'} onclick="go('review')">Review order →</button>
    </div></div>`;
}

function pieceRows(){
  const methodLabel={self:'Guided self-measurement',match:'Matched to a garment you love',home:'Home fitting booked'}[S.method];
  let rows='', fabCost=0;
  if(S.silhouette){
    rows+=`<div class="rrow"><div class="rk">Garment</div><div class="rv rmini">
        <div class="gpv">${garmentSVG(S.silhouette)}</div>
        <div><b>${lookById(S.silhouette).nm}</b></div></div></div>`;
  }
  const showFab=(kind,k)=>{
    const f=fabById(S.fabric[k]); if(!f) return;
    fabCost += f.pr*METERS[k];
    rows+=`<div class="rrow"><div class="rk">${kind}</div><div class="rv rmini">
        <div class="sw" style="background:${swatchBg(f)}"></div>
        <div><b>${f.nm}</b> · ${rupee(f.pr)}/m</div></div></div>`;
  };
  if(S.mode==='set'){ showFab('Top fabric','top'); showFab('Bottom fabric','bottom'); }
  else showFab(S.mode==='top'?'Top fabric':'Bottom fabric', S.mode);

  const styleBits=[];
  if(S.style.fit)styleBits.push(S.style.fit+' fit');
  if(S.style.collar)styleBits.push(S.style.collar+' collar');
  if(S.style.sleeve)styleBits.push(S.style.sleeve+' sleeve');
  if(S.style.waist)styleBits.push(S.style.waist);
  if(S.style.length)styleBits.push(S.style.length+' length');
  rows+=`<div class="rrow"><div class="rk">Style</div><div class="rv">${styleBits.join(' · ')||'House defaults'}</div></div>`;
  if(S.fitVersion==='sizes'){
    const sz=S.mode==='set'?`Top ${S.size.top||'—'} · Bottom ${S.size.bottom||'—'}`:(S.size[S.mode]||'—');
    rows+=`<div class="rrow"><div class="rk">Size</div><div class="rv">${sz}</div></div>`;
  } else {
    rows+=`<div class="rrow"><div class="rk">Fit method</div><div class="rv">${methodLabel}</div></div>`;
  }
  return {rows, fabCost};
}
function scReview(){
  const {rows, fabCost}=pieceRows();
  const stitch=STITCH[S.mode];
  const total=Math.round(fabCost+stitch);
  const pieceName=S.silhouette ? lookById(S.silhouette).nm : {top:'Top wear',bottom:'Bottom wear',set:'Top + Bottom set'}[S.mode];
  return `<div class="fadein">
    <div class="eyebrow">Almost there</div>
    <h2>Your made-to-measure ${pieceName.toLowerCase()}</h2>
    <div class="review">
      ${rows}
      <div class="total">
        <div><div class="tl">Estimated total</div><div class="br">Fabric ${rupee(Math.round(fabCost))} + stitching ${rupee(stitch)}</div></div>
        <div class="tv">${rupee(total)}</div>
      </div>
    </div>
    <div class="deliver">🧵 Stitched and delivered in 7–10 days · Free alteration if the fit is off</div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="go('measure')">← Back</button>
      <button class="btn btn-primary" onclick="go('done')">Place order →</button>
    </div></div>`;
}

function scDone(){
  const n='AT-'+Math.floor(100000+Math.random()*899999);
  return `<div class="confirm fadein">
    <div class="seal">✓</div>
    <h2>Your order is in.</h2>
    <p class="sub" style="margin-left:auto;margin-right:auto">We'll confirm your fit details, then our tailors get to work. You'll get updates as your garment is cut, stitched and shipped.</p>
    <div class="ordernum">ORDER ${n}</div>
    <div class="protonote">This is a clickable prototype for research — no real order was placed and no payment was taken. Watch where testers hesitated, what they tapped first, and what they said out loud here.</div>
    <div style="margin-top:28px"><button class="btn btn-primary" onclick="reset()">Run it again</button></div>
  </div>`;
}

/* ---------- nav ---------- */
function renderVersionToggle(){
  const a=document.getElementById('v-sizes'),b=document.getElementById('v-measure');
  if(!a) return;
  a.classList.toggle('on',S.fitVersion==='sizes');
  b.classList.toggle('on',S.fitVersion==='measure');
}
function render(){
  renderProgress();
  renderVersionToggle();
  const st=document.getElementById('stage');
  const map={hero:scHero,garment:scGarment,fabric:scFabric,look:scLook,style:scStyle,measure:scMeasure,review:scReview,done:scDone};
  st.innerHTML=map[S.step]();
  window.scrollTo({top:0,behavior:'smooth'});
}
function go(step){ S.step=step; render(); }
function pickGarment(id){
  const nm=modeOf(id);
  if(nm!==S.mode){ S.fabric={top:null,bottom:null}; S.size={top:null,bottom:null}; }
  S.silhouette=id; S.mode=nm; S.fabTab=(nm==='bottom'?'bottom':'top');
  render();
}
function setTab(t){ S.fabTab=t; render(); }
function pickFab(kind,id){ S.fabric[kind]=id; render(); }
function pickLook(id){ S.silhouette=id; render(); }
function pickStyle(k,v){ S.style[k]=v; render(); }
function pickMethod(m){ S.method=m; render(); }
function setVersion(v){ S.fitVersion=v; render(); }
function pickSize(kind,s){ S.size[kind]=s; render(); }
function toggleChart(){ S.chartOpen=!S.chartOpen; render(); }
function setUnit(u){ S.unit=u; render(); }

reset();
</script>
</body>
</html>
